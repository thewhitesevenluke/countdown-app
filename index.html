<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Countdown</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css?v=protected-date-mask-20260713">
  </head>
  <body>
    <main class="app" aria-label="Countdown app">
      <section class="countdown-stage" aria-live="polite">
        <div class="countdown-card" id="countdownCard">
          <div class="countdown-copy">
            <p class="selected-title" id="selectedTitle"></p>
            <div class="countdown-value" id="countdownValue"></div>
            <p class="countdown-label" id="countdownLabel"></p>
            <p class="countdown-date" id="countdownDate"></p>
          </div>

          <div class="progress-panel" aria-label="Time left progress">
            <div class="progress-ring" id="progressRing">
              <svg class="progress-svg" viewBox="0 0 100 100" aria-hidden="true">
                <circle class="progress-track" cx="50" cy="50" r="43.5" pathLength="100"></circle>
                <circle class="progress-arc" cx="50" cy="50" r="43.5" pathLength="100"></circle>
              </svg>
              <div class="progress-inner">
                <span class="progress-value" id="progressValue">0%</span>
                <span class="progress-label" id="progressLabel">left</span>
              </div>
            </div>
          </div>
        </div>

        <div class="actions" aria-label="Object actions">
          <button class="button button-secondary" id="deleteButton" type="button">
            <span class="button-label-desktop">Delete option</span>
            <span class="button-label-mobile">Delete</span>
          </button>
          <button class="button button-secondary" id="editButton" type="button">
            <span class="button-label-desktop">Edit object</span>
            <span class="button-label-mobile">Edit</span>
          </button>
          <button class="button button-primary" id="createButton" type="button">
            <span class="button-label-desktop">Create new object</span>
            <span class="button-label-mobile">New object</span>
          </button>
        </div>
      </section>

      <aside class="options-panel" aria-label="Saved countdown objects">
        <h1 class="options-title">Options</h1>
        <div class="options-list" id="optionsList"></div>
      </aside>

      <section class="calendar-workspace" aria-label="Calendar view">
        <div class="calendar-workspace-header">
          <div>
            <p class="calendar-eyebrow">All countdowns</p>
            <h2 id="workspaceCalendarTitle">Calendar</h2>
          </div>
          <div class="calendar-workspace-controls">
            <button class="calendar-nav" id="workspacePreviousMonthButton" type="button" aria-label="Previous calendar month"><span aria-hidden="true">‹</span></button>
            <button class="calendar-nav" id="workspaceNextMonthButton" type="button" aria-label="Next calendar month"><span aria-hidden="true">›</span></button>
          </div>
        </div>
        <div class="calendar-board" id="calendarBoard"></div>
      </section>
    </main>

    <dialog class="modal" id="objectDialog" aria-labelledby="objectDialogTitle">
      <form class="modal-panel" id="objectForm" novalidate>
        <div class="modal-header">
          <h2 id="objectDialogTitle">Create new object</h2>
          <button class="icon-button" id="closeObjectButton" type="button" aria-label="Close object dialog">
            &times;
          </button>
        </div>

        <label class="field">
          <span>Title</span>
          <input id="titleInput" name="title" type="text" autocomplete="off" maxlength="80">
        </label>

        <div class="field date-field">
          <span>Target date</span>
          <div class="date-input-wrap">
            <input
              id="dateInput"
              name="targetDate"
              type="text"
              inputmode="numeric"
              autocomplete="off"
              placeholder="MM/DD/YYYY"
            >
          </div>
        </div>

        <label class="field">
          <span>Target time</span>
          <input
            id="timeInput"
            name="targetTime"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            placeholder="Optional, like 10:06 PM"
          >
        </label>

        <label class="checkbox-field">
          <input id="repeatInput" name="repeatsYearly" type="checkbox">
          <span>Repeat yearly</span>
        </label>

        <p class="form-error" id="formError" role="alert"></p>

        <div class="modal-actions">
          <button class="button button-secondary" id="cancelObjectButton" type="button">
            Cancel
          </button>
          <button class="button button-primary" id="saveObjectButton" type="submit">
            Save object
          </button>
        </div>
      </form>
    </dialog>

    <dialog class="modal" id="deleteDialog" aria-labelledby="deleteDialogTitle">
      <form class="modal-panel confirm-panel" method="dialog">
        <h2 id="deleteDialogTitle">Delete option?</h2>
        <p id="deleteMessage"></p>
        <div class="modal-actions">
          <button class="button button-secondary" id="cancelDeleteButton" type="button">
            Cancel
          </button>
          <button class="button button-danger" id="confirmDeleteButton" type="button">
            Yes, delete
          </button>
        </div>
      </form>
    </dialog>

    <script src="app.js?v=protected-date-mask-20260713"></script>
  </body>
</html>
